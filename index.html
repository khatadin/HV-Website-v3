<!DOCTYPE html>
<html>
<head>
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
    input { padding: 8px; margin-right: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 8px 16px; cursor: pointer; }
    #error { color: red; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <div>
    <input type="password" id="pw" placeholder="Enter password" />
    <button onclick="checkPw()">Enter</button>
    <p id="error">Incorrect password.</p>
  </div>
  <script>
    function checkPw() {
      if (document.getElementById("pw").value === "skipowder") {
        window.location.href = "highvista_redesign.html";
      } else {
        document.getElementById("error").style.display = "block";
      }
    }
  </script>
</body>
</html>
